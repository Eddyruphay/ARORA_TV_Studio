name: Jarvis 2.0 - Content Pipeline

on:
  workflow_dispatch: # Allows manual triggering
  schedule:
    - cron: '0 * * * *' # Runs at the top of every hour

jobs:
  fetch-process-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: 3. Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 4. Fetch New Videos from Telegram
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          TELETHON_STRING_SESSION: ${{ secrets.TELETHON_STRING_SESSION }}
        run: python scripts/fetch_telegram.py

      - name: 5. Process and Upload to GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/process_and_upload.sh

      - name: 6. Commit Updated Data Files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(bot): ✨ Update content schedule"
          file_pattern: "data/schedule.json data/links.json data/last_ids.json"
          commit_options: '--no-verify'