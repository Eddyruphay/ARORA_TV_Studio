name: Jarvis 2.0 - Content Pipeline

on:
  workflow_dispatch: # Allows manual triggering
  schedule:
    - cron: '0 * * * *' # Runs at the top of every hour

jobs:
  fetch-process-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for Vercel CLI to detect changes

      - name: 2. Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: 3. Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 4. Fetch New Videos from Telegram
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          TELETHON_STRING_SESSION: ${{ secrets.TELETHON_STRING_SESSION }}
        run: python scripts/fetch_telegram.py

      - name: 5. Process and Upload Video Files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/process_and_upload.sh

      - name: 6. Setup Node.js and Vercel CLI
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - run: npm install -g vercel

      - name: 7. Install Upload Script Dependencies
        run: npm install
        working-directory: ./website

      - name: 8. Upload Schedule to Vercel Blob and Get URL
        id: upload_schedule
        env:
          VERCEL_BLOB_RW: ${{ secrets.VERCEL_BLOB_RW }}
        run: |
          URL=$(node scripts/upload_schedule.js)
          echo "SCHEDULE_URL=$URL" >> $GITHUB_OUTPUT
        
      - name: 9. Update Vercel Environment Variable & Redeploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          SCHEDULE_URL: ${{ steps.upload_schedule.outputs.SCHEDULE_URL }}
        run: |
          # Link project to Vercel
          vercel link --project arora-tv-studio --yes
          # Add the schedule URL as an environment variable
          vercel env rm SCHEDULE_URL production --token $VERCEL_TOKEN --yes || true
          vercel env add SCHEDULE_URL "$SCHEDULE_URL" production --token $VERCEL_TOKEN --yes
          # Trigger a new production deployment
          vercel --prod --token $VERCEL_TOKEN
        working-directory: ./website

      - name: 10. Commit Data Files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(bot): ✨ Update content links"
          file_pattern: "data/links.json data/last_ids.json"
          commit_options: '--no-verify'
